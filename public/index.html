    <!-- motor do carrossel-->
    <script>
        const carousel = document.getElementById('game-carousel');
        const indicatorsContainer = document.getElementById('carousel-indicators');

        // Pega apenas os jogos com" destaque: true"
        const carouselGames = gamesDatabase.filter(game => game.destaque === true);

        carouselGames.forEach(game => {
            const tagsHtml = game.tags.map(tag => `<span class="bg-[#1b2838]/80 text-[#dcdedf] px-2 py-1 text-xs md:text-sm rounded backdrop-blur-sm">${tag}</span>`).join('');

            // mostra preços só se tiverem desconto
            let priceBlockHtml = '';
            if (game.discount && game.oldPrice) {
                priceBlockHtml = `
                    <span class="bg-[#4c6b22] text-white px-2.5 py-1 md:px-3 md:py-1 text-base md:text-lg font-bold rounded-sm mr-3">${game.discount}</span>
                    <div class="flex flex-col text-right pr-2 justify-center">
                        <span class="text-xs md:text-sm text-[#dcdedf] line-through leading-none">${game.oldPrice}</span>
                        <span class="text-base md:text-xl text-white font-bold leading-none mt-1.5">${game.newPrice}</span>
                    </div>
                `;
            } else {
                priceBlockHtml = `
                    <div class="flex flex-col text-right pr-2 justify-center py-1.5 w-full">
                        <span class="text-base md:text-xl text-white font-bold leading-none">${game.newPrice}</span>
                    </div>
                `;
            }

            const cardHtml = `
                <div class="carousel-item snap-center shrink-0 w-full md:w-[80%] relative h-[250px] md:h-[350px] shadow-lg rounded-md hover:shadow-[#7726bd]/20 hover:shadow-2xl transition-all duration-300 cursor-pointer overflow-hidden group">
                    <img src="${game.image}" alt="${game.title}" class="absolute inset-0 w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#171a21] via-[#171a21]/60 to-transparent"></div>
                    <div class="absolute top-0 left-0 w-full h-1 bg-transparent group-hover:bg-[#7726bd] transition-colors duration-300"></div>

                    <div class="absolute bottom-0 left-0 w-full p-6 flex flex-col justify-end">
                        <h3 class="text-2xl font-bold text-white mb-3 group-hover:text-[#7726bd] transition-colors duration-200">${game.title}</h3>
                        <div class="flex items-end justify-between">
                            <div class="flex space-x-2">${tagsHtml}</div>
                            <div class="flex items-center bg-[#171a21] p-2 md:p-2.5 rounded border border-[#1b2838]">
                                ${priceBlockHtml}
                            </div>
                        </div>
                    </div>
                </div>
            `;
            carousel.insertAdjacentHTML('beforeend', cardHtml);
        });



        // função de esteira infinita do carrossel
        function scrollCarouselTo(item, isSmooth = true) {
            const scrollPos = item.offsetLeft - carousel.offsetLeft - (carousel.clientWidth - item.clientWidth) / 2;
            carousel.scrollTo({ left: scrollPos, behavior: isSmooth ? 'smooth' : 'auto' });
        }
        const originalItems = Array.from(carousel.querySelectorAll('.carousel-item'));
        const originalCount = originalItems.length;

        // inicia na página 2
        let currentIndex = 1;
        let autoPlayInterval;

        // limpa os indicadores antes de criar (segurança)
        indicatorsContainer.innerHTML = '';

        // cria os botões
        originalItems.forEach((_, index) => {
            const dot = document.createElement('button');
            dot.className = `indicator-dot h-1.5 w-8 rounded-full transition-colors duration-300 ${index === currentIndex ? 'bg-[#7726bd]' : 'bg-[#dcdedf] hover:bg-[#7726bd]'}`;

            dot.addEventListener('click', () => {
                stopAutoPlay();
                const allItems = carousel.querySelectorAll('.carousel-item');
                const currentSetBase = Math.floor(currentIndex / originalCount) * originalCount;
                let targetIndex = currentSetBase + index;

                if (allItems[targetIndex]) {
                    scrollCarouselTo(allItems[targetIndex], true);
                }
                startAutoPlay();
            });
            indicatorsContainer.appendChild(dot);
        });

        const dots = document.querySelectorAll('.indicator-dot');

        // controle da rolagem/vigia (IntersectionObserver)
        const observerOptions = { root: carousel, threshold: 0.6 };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const allItems = Array.from(carousel.querySelectorAll('.carousel-item'));
                    currentIndex = allItems.indexOf(entry.target);

                    const realDotIndex = currentIndex % originalCount;
                    dots.forEach((d, i) => {
                        d.classList.toggle('bg-[#7726bd]', i === realDotIndex);
                        d.classList.toggle('bg-[#dcdedf]', i !== realDotIndex);
                    });

                    if (currentIndex >= allItems.length - 2) {
                        originalItems.forEach(item => {
                            const clone = item.cloneNode(true);
                            observer.observe(clone);
                            carousel.appendChild(clone);
                        });
                    }
                }
            });
        }, observerOptions);

        originalItems.forEach(item => observer.observe(item));

        // Autoscroll
        function startAutoPlay() {
            autoPlayInterval = setInterval(() => {
                const allItems = carousel.querySelectorAll('.carousel-item');
                currentIndex++;
                if (allItems[currentIndex]) {
                    // SUBSTITUA O scrollIntoView POR ESTA LINHA:
                    scrollCarouselTo(allItems[currentIndex], true);
                }
            }, 4000);
        }

        function stopAutoPlay() {
            clearInterval(autoPlayInterval);
        }

        // inicia rolagem do carrossel
        function initCarousel() {
            carousel.classList.remove('scroll-smooth');
            if (originalItems[1]) {
                scrollCarouselTo(originalItems[1], false);
            }
            setTimeout(() => {
                carousel.classList.add('scroll-smooth');
                startAutoPlay();
            }, 100);
        }

        if (document.readyState === 'complete') {
            initCarousel();
        } else {
            window.addEventListener('load', initCarousel);
        }

        carousel.addEventListener('mouseenter', stopAutoPlay);
        carousel.addEventListener('mouseleave', startAutoPlay);
        carousel.addEventListener('touchstart', stopAutoPlay, { passive: true });
        carousel.addEventListener('touchend', startAutoPlay);
    </script>

    <!-- Validação da entreda de email -->
    <script>
        const form = document.getElementById('feedback-form');
        const emailInput = document.getElementById('email');
        const emailError = document.getElementById('email-error');
        const btnEnviar = document.getElementById('btn-enviar');

        form.addEventListener('submit', function (event) {
            // Impede o formulário de recarregar a página (comportamento padrão)
            event.preventDefault();

            // Pega o que o usuário digitou no campo de email
            const emailValue = emailInput.value.trim();

            // Regex: texto "@" texto "." texto
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!emailRegex.test(emailValue)) {
                // email inválido
                emailError.classList.remove('hidden');
                emailInput.classList.remove('focus:border-[#7726bd]', 'border-transparent');
                emailInput.classList.add('border-red-500', 'focus:border-red-500');
            } else {
                // valida email depois do erro
                emailError.classList.add('hidden');
                emailInput.classList.remove('border-red-500', 'focus:border-red-500');
                emailInput.classList.add('focus:border-[#7726bd]', 'border-transparent');

                // simula sucesso no envio
                const textoOriginal = btnEnviar.innerText;
                btnEnviar.innerText = "Enviado com Sucesso! ✓";
                btnEnviar.classList.replace('bg-[#7726bd]', 'bg-[#4c6b22]'); // Fica verde
                btnEnviar.classList.replace('hover:bg-[#913ce0]', 'hover:bg-[#5f862a]');

                // Limpa o formulário
                form.reset();

                // Volta o botão ao normal depois de 3 segundos
                setTimeout(() => {
                    btnEnviar.innerText = textoOriginal;
                    btnEnviar.classList.replace('bg-[#4c6b22]', 'bg-[#7726bd]');
                    btnEnviar.classList.replace('hover:bg-[#5f862a]', 'hover:bg-[#913ce0]');
                }, 3000);
            }
        });

        // Limpa o erro se o usuário começar a digitar novamente
        emailInput.addEventListener('input', () => {
            emailError.classList.add('hidden');
            emailInput.classList.remove('border-red-500', 'focus:border-red-500');
            emailInput.classList.add('focus:border-[#7726bd]', 'border-transparent');
        });
    </script>
